</head>
<body>

    <nav class="neon-nav">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-shield-haltered"></i> CYBER::VAULT 
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-terminal"></i> TERMINAL</a></li>

                <span class="bar"></span>

<main class="container">
    <h2 class="page-title">
        <i class="fas fa-terminal"></i> Console Contact 
        <span style="font-size:0.8rem;">[ secure@vault ]</span>
    </h2>
    <div class="terminal-form-card">
        <div class="term-prompt-bar">
            <span class="user-prompt">visitor@cybervault:~$</span> ./send_message --secure
        </div>
            <form id="consoleForm">
                <div class="input-line">
                    <span class="prompt-sign">></span>
                    <input type="text" id="name" placeholder="your_handle" required>
                    <label>NAME</label>
                </div>
                <div class="input-line">
                    <span class="prompt-sign">></span> 
                    <input type="email" id="email" placeholder="you@proton.me" required>
                    <label>EMAIL</label>
                </div>
                <div class="input-line textarea-line">
                    <span class="prompt-sign">></span> 
                    <textarea id="msg" rows="3" placeholder="encrypted_message_here" required></textarea>
                    <label>MESSAGE</label>
                </div>
                <button type="submit" class="cmd-button">
                    <i class="fas fa-paper-plane"></i> submit_secure()
                </button>
                <div id="form-feedback" class="feedback"></div>
            </form>
        </div>
</main>
